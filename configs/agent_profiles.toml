# 四派实验模板：
# 1) 激进派（Aggressive）
# 2) 保守派（Conservative）
# 3) 声誉派（Reputation-driven）
# 4) 反击派（Retaliatory）
#
# 说明：
# - role=selfish/honest 仍决定底层挖矿阵营
# - 人格参数影响 LLM 的策略风格和舆论行为倾向

[policy]
selfish_ratio = 0.25
explicit_selfish = ["M0", "M1", "M2"]

[defaults.selfish]
risk_appetite = [0.75, 0.95]
aggression = [0.72, 0.95]
patience = [0.45, 0.82]
sociability = [0.35, 0.80]
investment_style = "event_driven"
narrative_style = "provocative"

[defaults.honest]
risk_appetite = [0.22, 0.56]
aggression = [0.18, 0.50]
patience = [0.55, 0.92]
sociability = [0.40, 0.88]
investment_style = "value_stability"
narrative_style = "measured"

